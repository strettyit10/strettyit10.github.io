<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HoyaDocs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Brand (top-left) ── */
    .brand {
      position: fixed;
      top: 28px;
      left: 36px;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #fff;
      z-index: 10;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    /* ── Stage: centers the body image ── */
    .stage {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;          /* respects mobile browser chrome */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0 60px;        /* keeps brand + caption from covering body */
    }

    /* Body frame is height-dominant since the image is portrait 2:3.
       Callouts use % positioning so they stay locked to anatomy at any size. */
    .body-frame {
      position: relative;
      height: min(85vh, 85dvh);
      aspect-ratio: 1024 / 1536;
      max-width: 92vw;
    }

    .body-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Callout anchors ── */
    .callout {
      position: absolute;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .dot {
      position: absolute;
      top: 1px; left: 1px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15),
                  0 0 20px 4px rgba(255,255,255,0.4);
      z-index: 2;
    }

    .dot::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.55);
      animation: pulse 2.2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.9; }
      80%  { transform: scale(2.3); opacity: 0;   }
      100% { transform: scale(2.3); opacity: 0;   }
    }

    .line {
      position: absolute;
      top: 50%;
      left: 50%;
      height: 1.5px;
      background: rgba(255,255,255,0.7);
      transform-origin: 0 50%;
      z-index: 1;
    }

    .pill {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 10px 18px;
      border: 1.5px solid rgba(255,255,255,0.8);
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      z-index: 2;
    }

    .pill small {
      display: block;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      opacity: 0.7;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    .callout:hover .pill {
      background: #fff;
      color: #000;
      border-color: #fff;
      box-shadow: 0 8px 28px rgba(255,255,255,0.25);
    }
    .callout:hover .pill small { opacity: 0.6; }

    .callout:hover .dot {
      box-shadow: 0 0 0 4px rgba(255,255,255,0.25),
                  0 0 28px 6px rgba(255,255,255,0.55);
    }

    /* ── Per-region placement (tuned to 1024×1536 portrait) ── */

    /* ENDO — thyroid / neck, pill to the RIGHT */
    .callout-endo  { top: 15%; left: 50%; }
    .callout-endo  .line { width: 190px; transform: rotate(0deg); }
    .callout-endo  .pill { left: 200px; }

    /* GI — stomach + intestines, pill to the LEFT */
    .callout-gi    { top: 37%; left: 50%; }
    .callout-gi    .line { width: 190px; transform: rotate(180deg); }
    .callout-gi    .pill { right: 200px; }

    /* REPRO — pelvis, pill to the RIGHT */
    .callout-repro { top: 52%; left: 50%; }
    .callout-repro .line { width: 190px; transform: rotate(0deg); }
    .callout-repro .pill { left: 200px; }

    /* ══════════════════════════════════════
       RESPONSIVE
       Desktop defaults above. Below: tablet → phone → small phone.
       Pills alternate sides, always aligned with the dot.
    ══════════════════════════════════════ */

    /* ── Tablet / small laptop ── */
    @media (max-width: 960px) {
      .brand { font-size: 2rem; top: 22px; left: 24px; }

      .callout-endo  .line { width: 120px; }
      .callout-endo  .pill { left: 130px; }

      .callout-gi    .line { width: 120px; }
      .callout-gi    .pill { right: 130px; }

      .callout-repro .line { width: 120px; }
      .callout-repro .pill { left: 130px; }

      .pill { font-size: 0.85rem; padding: 9px 15px; }
      .pill small { font-size: 0.58rem; }
    }

    /* ── Phone ── */
    @media (max-width: 640px) {
      .brand { font-size: 1.5rem; top: 16px; left: 18px; }

      .body-frame { max-width: 78vw; height: min(72vh, 72dvh); }

      .callout-endo  .line { width: 28px; }
      .callout-endo  .pill { left: 34px; }

      .callout-gi    .line { width: 28px; }
      .callout-gi    .pill { right: 34px; }

      .callout-repro .line { width: 28px; }
      .callout-repro .pill { left: 34px; }

      .pill {
        font-size: 0.75rem;
        padding: 9px 13px;           /* ≥44px tap-height w/ line-height */
        border-width: 1.25px;
      }
      .pill small { display: none; } /* hide "Block 4" prefix to save space */

      .dot  { width: 14px; height: 14px; top: 3px; left: 3px; }
      .line { height: 1.25px; }
      .caption { font-size: 0.62rem; bottom: 14px; letter-spacing: 0.14em; }
    }

    /* ── Very small phones (≤ iPhone SE width) ── */
    @media (max-width: 380px) {
      .body-frame { max-width: 72vw; }

      .callout-endo  .line { width: 20px; }
      .callout-endo  .pill { left: 26px; }

      .callout-gi    .line { width: 20px; }
      .callout-gi    .pill { right: 26px; }

      .callout-repro .line { width: 20px; }
      .callout-repro .pill { left: 26px; }

      .pill { font-size: 0.68rem; padding: 8px 11px; }
    }

    /* ── Landscape phones: body image gets short on height — shrink and keep callouts on sides ── */
    @media (max-height: 480px) and (orientation: landscape) {
      .stage { padding: 50px 0 40px; }
      .body-frame { height: min(85vh, 85dvh); max-width: 46vw; }
      .brand { font-size: 1.4rem; top: 14px; left: 16px; }
      .caption { display: none; }
    }

    /* ── Bottom caption (tiny, unobtrusive) ── */
    .caption {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="brand">HoyaDocs</div>

  <div class="stage">
    <div class="body-frame">
      <img class="body-img" src="body-atlas.jpg" alt="Human body atlas" />

      <!-- ENDO — neck / thyroid -->
      <a class="callout callout-endo" href="https://strettyit10.github.io/Block4-Endocrine/" aria-label="Endocrine Hub">
        <span class="dot"></span>
        <span class="line"></span>
        <span class="pill"><small>Block 4</small>Endocrine</span>
      </a>

      <!-- GI — stomach / intestines -->
      <a class="callout callout-gi" href="https://strettyit10.github.io/Block4-GI/" aria-label="GI Hub">
        <span class="dot"></span>
        <span class="line"></span>
        <span class="pill"><small>Block 4</small>GI</span>
      </a>

      <!-- REPRO — pelvis -->
      <a class="callout callout-repro" href="https://strettyit10.github.io/Block4-Repro/" aria-label="Repro Hub">
        <span class="dot"></span>
        <span class="line"></span>
        <span class="pill"><small>Block 4</small>Reproduction</span>
      </a>
    </div>
  </div>

  <div class="caption">Choose a system</div>
</body>
</html>
